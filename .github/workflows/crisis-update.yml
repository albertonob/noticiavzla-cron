name: 🚨 Actualizar cifras terremoto Venezuela

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-crisis-stats:
    name: Scraping cifras de víctimas
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Actualizar cifras (crisis-stats)
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 30 \
            -X POST \
            -H "X-Cron-Key: ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Accept-Language: es-ES,es;q=0.9" \
            -H "Referer: ${{ secrets.SITE_URL }}/" \
            -H "Origin: ${{ secrets.SITE_URL }}" \
            "${{ secrets.SITE_URL }}/api/crisis-stats.php")
          echo "HTTP Status crisis-stats: $HTTP_STATUS"
          cat /tmp/response.txt
          if [ "$HTTP_STATUS" = "403" ]; then
            echo "⚠️ Bloqueado por firewall — verificar whitelist de IP en hosting"
            exit 1
          fi

      - name: Actualizar noticias RSS (fetch-news)
        run: |
          curl -s --max-time 60 \
            -X POST \
            -H "X-Cron-Key: ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Accept-Language: es-ES,es;q=0.9" \
            -H "Referer: ${{ secrets.SITE_URL }}/" \
            -H "Origin: ${{ secrets.SITE_URL }}" \
            "${{ secrets.SITE_URL }}/api/fetch-news.php" || true

      - name: Scraping BBC Mundo live
        run: |
          curl -s --max-time 30 \
            -X POST \
            -H "X-Cron-Key: ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Accept-Language: es-ES,es;q=0.9" \
            -H "Referer: ${{ secrets.SITE_URL }}/" \
            -H "Origin: ${{ secrets.SITE_URL }}" \
            "${{ secrets.SITE_URL }}/api/fetch-bbc-live.php" || true

      - name: Resultado
        if: always()
        run: echo "✅ Ciclo completado — $(date '+%Y-%m-%d %H:%M:%S UTC')"
