name: 🚨 Actualizar cifras terremoto Venezuela

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-crisis-stats:
    name: Scraping cifras de víctimas
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Actualizar cifras (crisis-stats)
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 30 \
            -X POST \
            "${{ secrets.SITE_URL }}/api/crisis-stats.php" \
            -H "X-Cron-Key: ${{ secrets.CRON_SECRET }}")
          echo "HTTP Status crisis-stats: $HTTP_STATUS"
          cat /tmp/response.txt
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ crisis-stats devolvió $HTTP_STATUS"
            exit 1
          fi

      - name: Actualizar noticias RSS (fetch-news)
        run: |
          curl -s --max-time 60 \
            -X POST \
            "${{ secrets.SITE_URL }}/api/fetch-news.php" \
            -H "X-Cron-Key: ${{ secrets.CRON_SECRET }}"

      - name: Scraping BBC Mundo live
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/bbc.txt -w "%{http_code}" \
            --max-time 30 \
            -X POST \
            "${{ secrets.SITE_URL }}/api/fetch-bbc-live.php" \
            -H "X-Cron-Key: ${{ secrets.CRON_SECRET }}")
          echo "HTTP Status BBC live: $HTTP_STATUS"
          cat /tmp/bbc.txt

      - name: Resultado
        if: always()
        run: echo "✅ Ciclo completado — $(date '+%Y-%m-%d %H:%M:%S UTC')"
